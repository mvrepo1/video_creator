<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Creator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0f;--surface:#17171a;--surface2:#1f1f24;--surface3:#27272d;
  --border:#2e2e36;--border2:#3a3a44;
  --text:#e8e8f0;--text2:#8888a0;--text3:#5555688;
  --accent:#7c6af7;--accent2:#9d8fff;--accent-glow:rgba(124,106,247,0.25);
  --success:#3ecf73;--error:#f05252;--warning:#f59e0b;--warning-glow:rgba(245,158,11,0.2);
  --radius:10px;--radius-sm:6px;
}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.header{
  padding:14px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  background:linear-gradient(180deg,#13131800 0%,var(--surface) 100%);
  flex-shrink:0;
}
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:var(--accent2)}
.logo span{color:var(--text2);font-weight:400}

/* ── TOOLBAR ── */
.toolbar{
  padding:12px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--surface);flex-shrink:0;
}
.toolbar-group{display:flex;align-items:center;gap:6px}
.toolbar-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-right:2px}

/* Segmented control */
.seg{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;gap:2px;border:1px solid var(--border)}
.seg-btn{
  padding:5px 14px;border-radius:4px;border:none;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--text2);background:transparent;
  transition:all 0.15s;white-space:nowrap;
}
.seg-btn.active{background:var(--accent);color:#fff;box-shadow:0 0 12px var(--accent-glow)}
.seg-btn:hover:not(.active){background:var(--surface3);color:var(--text)}

.divider-v{width:1px;height:24px;background:var(--border);margin:0 4px}

/* ── BUTTONS ── */
.btn{
  padding:7px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-size:13px;font-weight:500;transition:all 0.15s;display:inline-flex;
  align-items:center;gap:6px;white-space:nowrap;
}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn:hover:not(:disabled){filter:brightness(1.1)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--error);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){border-color:var(--border2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-icon{padding:6px 10px;font-size:14px}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── SECTIONS PANEL ── */
.sections-panel{
  flex:1;overflow-y:auto;padding:20px 24px;
  display:flex;flex-direction:column;gap:16px;
}
.sections-panel::-webkit-scrollbar{width:5px}
.sections-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── SECTION CARD ── */
.section-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color 0.2s;margin-bottom:12px;
}
.section-card:hover{border-color:var(--border2)}
.section-card.active{border-color:var(--accent)}

.section-header{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  cursor:grab;user-select:none;
}
.section-header:active{cursor:grabbing}
.section-num{
  width:26px;height:26px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.section-title{font-size:13px;font-weight:500;flex:1;color:var(--text2)}
.section-duration{font-size:11px;color:var(--text2);margin-right:4px}

.section-body{display:flex;gap:0}

/* Script area */
.script-area{flex:1;padding:14px}
.script-label{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px}
.script-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:var(--radius-sm);
  font-size:13px;line-height:1.6;resize:vertical;min-height:80px;max-height:200px;
  outline:none;font-family:inherit;
}
.script-input:focus{border-color:var(--accent)}
.char-count{font-size:11px;color:var(--text2);text-align:right;margin-top:4px}

/* Image area */
.image-area{
  width:200px;flex-shrink:0;padding:14px;
  border-left:1px solid var(--border);display:flex;flex-direction:column;gap:8px;
}
.image-preview{
  width:100%;aspect-ratio:16/9;background:var(--surface2);border:2px dashed var(--border);
  border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative;transition:border-color 0.15s;
}
.image-preview.portrait{aspect-ratio:9/16}
.image-preview:hover{border-color:var(--accent)}
.image-preview img{width:100%;height:100%;object-fit:cover;display:none}
.image-preview img.loaded{display:block}
.image-placeholder{text-align:center;color:var(--text2);font-size:11px;line-height:1.6}
.image-placeholder .icon{font-size:22px;margin-bottom:4px}
.img-path{font-size:10px;color:var(--text2);word-break:break-all;text-align:center}

/* ── ADD SECTION ── */
.add-section{
  display:flex;align-items:center;justify-content:center;
  border:2px dashed var(--border);border-radius:var(--radius);padding:20px;
  cursor:pointer;color:var(--text2);font-size:13px;gap:8px;transition:all 0.15s;
}
.add-section:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ── RIGHT PANEL ── */
.right-panel{
  width:300px;border-left:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--surface);flex-shrink:0;overflow:hidden;
}

.panel-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
  min-height:0;
}
.panel-scroll::-webkit-scrollbar{width:4px}
.panel-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.panel-scroll::-webkit-scrollbar-track{background:transparent}

.panel-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text);
}

/* Output config */
.config-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.config-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.config-row{display:flex;flex-direction:column;gap:10px}

.output-dir-row{display:flex;gap:6px;align-items:center}
.output-dir-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:var(--radius-sm);font-size:12px;outline:none;
}
.output-dir-input:focus{border-color:var(--accent)}

/* Actions */
.action-section{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}

/* Progress */
.progress-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.progress-bar-wrap{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-bottom:8px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.3s;border-radius:4px;width:0%}
.progress-status{font-size:12px;color:var(--text2);text-align:center}

/* Done output */
.done-section{padding:14px 16px;display:none;flex-direction:column;gap:8px}
.done-section.show{display:flex}
.done-path{
  font-size:11px;color:var(--success);word-break:break-all;
  background:rgba(62,207,115,0.08);padding:8px 10px;border-radius:var(--radius-sm);
  border:1px solid rgba(62,207,115,0.2);
}

/* ── LOG ── */
.log-section{height:220px;overflow:hidden;display:flex;flex-direction:column;border-top:1px solid var(--border);flex-shrink:0}
.log-header{padding:10px 16px;font-size:11px;color:var(--text2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.log-container{flex:1;overflow-y:auto;padding:10px 16px;font-family:"Consolas",monospace;font-size:11px;line-height:1.8}
.log-container::-webkit-scrollbar{width:4px}
.log-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.log-line{margin-bottom:1px}
.log-info{color:var(--text2)}
.log-success{color:var(--success)}
.log-error{color:var(--error)}
.log-warning{color:var(--warning)}

/* ── SUMMARY BAR ── */
.summary-bar{
  padding:10px 24px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:16px;background:var(--surface);
  font-size:12px;color:var(--text2);flex-shrink:0;
}
.summary-stat{display:flex;align-items:center;gap:5px}
.summary-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

/* ── BG MUSIC ── */
.music-row{display:flex;gap:6px;align-items:center}
.music-name{
  flex:1;font-size:11px;color:var(--text2);
  background:var(--surface2);border:1px solid var(--border);
  padding:5px 8px;border-radius:var(--radius-sm);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.music-name.has-file{color:var(--success)}
.volume-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.volume-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;outline:none;cursor:pointer;
  background:linear-gradient(90deg, var(--accent) 15%, var(--surface3) 15%);
}
.volume-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent2);cursor:pointer;border:2px solid var(--bg);
  box-shadow:0 0 6px var(--accent-glow);
}
.volume-val{font-size:11px;color:var(--text);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* ── TEXT OVERLAY ── */
.overlay-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.overlay-row{display:flex;flex-direction:column;gap:10px}
.overlay-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:var(--radius-sm);font-size:12px;outline:none;
}
.overlay-input:focus{border-color:var(--accent)}
.overlay-input::placeholder{color:var(--text2)}
.overlay-inline{display:flex;gap:6px;align-items:center}
.overlay-inline label{font-size:11px;color:var(--text2);white-space:nowrap}
.overlay-select{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:5px 8px;border-radius:var(--radius-sm);font-size:12px;outline:none;cursor:pointer;
}
.overlay-select:focus{border-color:var(--accent)}
.overlay-number{
  width:58px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:5px 8px;border-radius:var(--radius-sm);font-size:12px;outline:none;text-align:center;
}
.overlay-number:focus{border-color:var(--accent)}
.color-swatches{display:flex;gap:5px;flex-wrap:wrap}
.color-swatch{
  width:20px;height:20px;border-radius:3px;cursor:pointer;border:2px solid transparent;
  transition:border-color 0.15s,transform 0.1s;flex-shrink:0;
}
.color-swatch:hover{transform:scale(1.18)}
.color-swatch.selected{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent)}
.overlay-sub-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.overlay-color-row{display:flex;align-items:center;gap:8px}
.overlay-color-row .overlay-sub-label{margin-top:0;white-space:nowrap;min-width:38px}

/* ── EMPTY STATE ── */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text2);gap:12px;padding:40px;
}
.empty-icon{font-size:48px;opacity:0.3}
.empty-text{font-size:14px;text-align:center;line-height:1.6}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Video<span>Creator</span></div>

  <div class="toolbar-group">
    <span class="toolbar-label">Tỉ lệ</span>
    <div class="seg" id="aspectSeg">
      <button class="seg-btn active" data-val="16:9">▬ 16:9</button>
      <button class="seg-btn" data-val="9:16">▮ 9:16</button>
    </div>
  </div>

  <div class="divider-v"></div>

  <div class="toolbar-group">
    <span class="toolbar-label">Giọng</span>
    <div class="seg" id="genderSeg">
      <button class="seg-btn active" data-val="female">♀ Nữ</button>
      <button class="seg-btn" data-val="male">♂ Nam</button>
    </div>
  </div>

  <div class="divider-v"></div>

  <div class="toolbar-group">
    <span class="toolbar-label">Ngôn ngữ</span>
    <div class="seg" id="langSeg">
      <button class="seg-btn active" data-val="vi">🇻🇳 VI</button>
      <button class="seg-btn" data-val="en">🇺🇸 EN</button>
      <button class="seg-btn" data-val="es">🇪🇸 ES</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SECTIONS -->
  <div class="sections-panel" id="sectionsPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎬</div>
      <div class="empty-text">Chưa có section nào.<br>Ấn "+ Thêm Section" để bắt đầu.</div>
    </div>
    <div id="sectionsList"></div>
    <div class="add-section" id="addSectionBtn">
      <span style="font-size:18px">＋</span> Thêm Section
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-header">⚙ Cài đặt & Xuất</div>

    <div class="panel-scroll">

    <div class="config-section">
      <div class="config-label">Thư mục xuất</div>
      <div class="output-dir-row">
        <input class="output-dir-input" id="outputDir" placeholder="Chọn thư mục..." readonly />
        <button class="btn btn-ghost btn-sm" id="pickDirBtn">📁</button>
      </div>
    </div>

    <div class="action-section">
      <button class="btn btn-primary" id="runBtn" disabled>▶ Tạo Video</button>
      <button class="btn btn-warning" id="resumeBtn" style="display:none;background:var(--warning);color:#000">↩ Tiếp tục từ section <span id="resumeLabel">1</span></button>
      <button class="btn btn-danger" id="stopBtn" disabled>■ Dừng</button>
    </div>

    <div class="progress-section">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-status" id="progressStatus">Sẵn sàng</div>
    </div>

    <!-- BG MUSIC -->
    <div class="config-section">
      <div class="config-label">Nhạc nền</div>
      <div class="music-row">
        <div class="music-name" id="musicName">Chưa chọn file nhạc</div>
        <button class="btn btn-ghost btn-sm" id="pickMusicBtn">🎵</button>
        <button class="btn btn-ghost btn-sm btn-icon" id="clearMusicBtn" title="Xóa nhạc nền" style="display:none">✕</button>
      </div>
      <div class="volume-row">
        <span style="font-size:11px;color:var(--text2)">🔊</span>
        <input type="range" class="volume-slider" id="bgMusicVolume" min="0" max="100" value="15" />
        <span class="volume-val" id="bgMusicVolumeVal">15%</span>
      </div>
    </div>

    <!-- TEXT OVERLAY -->
    <div class="overlay-section">
      <div class="config-label">Text Overlay</div>
      <div class="overlay-row">
        <input class="overlay-input" id="overlayTitle" placeholder="Title (để trống = không hiện)" />
        <input class="overlay-input" id="overlaySubtitle" placeholder="Subtitle (để trống = không hiện)" />

        <div class="overlay-sub-label">Font</div>
        <select class="overlay-select" id="overlayFont">
          <option value="Arial">Arial</option>
          <option value="Georgia">Georgia</option>
          <option value="Courier New">Courier New</option>
          <option value="Tahoma">Tahoma</option>
          <option value="Verdana">Verdana</option>
          <option value="Impact">Impact</option>
        </select>

        <div class="overlay-inline">
          <label>Title size</label>
          <input class="overlay-number" id="overlayTitleSize" type="number" value="52" min="12" max="200" />
          <label>Sub size</label>
          <input class="overlay-number" id="overlaySubSize" type="number" value="32" min="10" max="120" />
        </div>

        <div class="overlay-sub-label">Màu chữ</div>

        <div class="overlay-color-row">
          <div class="overlay-sub-label" style="color:var(--text)">Title</div>
          <div class="color-swatches" id="titleColorSwatches">
            <div class="color-swatch selected" data-color="white"     style="background:#ffffff"             title="Trắng"></div>
            <div class="color-swatch"          data-color="ivory"     style="background:#FFFFF0"             title="Kem"></div>
            <div class="color-swatch"          data-color="yellow"    style="background:#FFE600"             title="Vàng"></div>
            <div class="color-swatch"          data-color="gold"      style="background:#FFD700"             title="Vàng kim"></div>
            <div class="color-swatch"          data-color="orange"    style="background:#FF8C00"             title="Cam"></div>
            <div class="color-swatch"          data-color="red"       style="background:#FF3333"             title="Đỏ"></div>
            <div class="color-swatch"          data-color="pink"      style="background:#FF69B4"             title="Hồng"></div>
            <div class="color-swatch"          data-color="cyan"      style="background:#00EEFF"             title="Cyan"></div>
            <div class="color-swatch"          data-color="skyblue"   style="background:#87CEEB"             title="Xanh trời"></div>
            <div class="color-swatch"          data-color="lime"      style="background:#39FF14"             title="Xanh lá neon"></div>
            <div class="color-swatch"          data-color="lightgreen"style="background:#90EE90"             title="Xanh lá nhạt"></div>
            <div class="color-swatch"          data-color="violet"    style="background:#EE82EE"             title="Tím"></div>
            <div class="color-swatch"          data-color="silver"    style="background:#C0C0C0"             title="Bạc"></div>
            <div class="color-swatch"          data-color="black"     style="background:#111111;border-color:#444" title="Đen"></div>
          </div>
        </div>

        <div class="overlay-color-row">
          <div class="overlay-sub-label" style="color:var(--text)">Sub</div>
          <div class="color-swatches" id="subColorSwatches">
            <div class="color-swatch selected" data-color="white"     style="background:#ffffff"             title="Trắng"></div>
            <div class="color-swatch"          data-color="ivory"     style="background:#FFFFF0"             title="Kem"></div>
            <div class="color-swatch"          data-color="yellow"    style="background:#FFE600"             title="Vàng"></div>
            <div class="color-swatch"          data-color="gold"      style="background:#FFD700"             title="Vàng kim"></div>
            <div class="color-swatch"          data-color="orange"    style="background:#FF8C00"             title="Cam"></div>
            <div class="color-swatch"          data-color="red"       style="background:#FF3333"             title="Đỏ"></div>
            <div class="color-swatch"          data-color="pink"      style="background:#FF69B4"             title="Hồng"></div>
            <div class="color-swatch"          data-color="cyan"      style="background:#00EEFF"             title="Cyan"></div>
            <div class="color-swatch"          data-color="skyblue"   style="background:#87CEEB"             title="Xanh trời"></div>
            <div class="color-swatch"          data-color="lime"      style="background:#39FF14"             title="Xanh lá neon"></div>
            <div class="color-swatch"          data-color="lightgreen"style="background:#90EE90"             title="Xanh lá nhạt"></div>
            <div class="color-swatch"          data-color="violet"    style="background:#EE82EE"             title="Tím"></div>
            <div class="color-swatch"          data-color="silver"    style="background:#C0C0C0"             title="Bạc"></div>
            <div class="color-swatch"          data-color="black"     style="background:#111111;border-color:#444" title="Đen"></div>
          </div>
        </div>

        <div class="overlay-inline">
          <label>Top %</label>
          <input class="overlay-number" id="overlayTop" type="number" value="10" min="0" max="90" />
          <label style="margin-left:8px">Hiện (s)</label>
          <input class="overlay-number" id="overlayDuration" type="number" value="5" min="1" max="60" />
        </div>
      </div>
    </div>

    <div class="done-section" id="doneSection">
      <div style="font-size:12px;color:var(--success);font-weight:600">✅ Hoàn thành!</div>
      <div class="done-path" id="donePath"></div>
    </div><!-- /done-section -->

    </div><!-- /panel-scroll -->

    <div class="log-section">
      <div class="log-header">
        <span>Log</span>
        <button class="btn btn-ghost btn-sm" onclick="clearLog()">Xóa</button>
      </div>
      <div class="log-container" id="logContainer">
        <div class="log-line log-info">Sẵn sàng...</div>
      </div>
    </div>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="summary-stat"><div class="summary-dot"></div><span id="statSections">0 sections</span></div>
  <div class="summary-stat">⏱ <span id="statChars">0 ký tự</span></div>
  <div class="summary-stat">📐 <span id="statAspect">16:9</span></div>
  <div class="summary-stat">🎙 <span id="statVoice">Nữ · Tiếng Việt</span></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let sections = [];
let config = { aspectRatio: "16:9", gender: "female", lang: "vi", outputDir: "" };
let isRunning = false;
let sectionIdCounter = 0;
let resumeFromIndex = 0;

// ============================================================
// SEGMENTED CONTROLS
// ============================================================
function initSeg(id, key) {
  const seg = document.getElementById(id);
  seg.querySelectorAll(".seg-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      seg.querySelectorAll(".seg-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      config[key] = btn.dataset.val;
      if (key === "aspectRatio") {
        updateImagePreviews();
        document.getElementById("statAspect").textContent = config.aspectRatio;
      }
      if (key === "gender" || key === "lang") updateVoiceStat();
    });
  });
}
initSeg("aspectSeg", "aspectRatio");
initSeg("genderSeg", "gender");
initSeg("langSeg", "lang");

function updateVoiceStat() {
  const gMap = { female: "Nữ", male: "Nam" };
  const lMap = { vi: "Tiếng Việt", en: "English", es: "Español" };
  document.getElementById("statVoice").textContent = `${gMap[config.gender]} · ${lMap[config.lang]}`;
}

// ============================================================
// SECTIONS
// ============================================================
function addSection() {
  const id = ++sectionIdCounter;
  sections.push({ id, script: "", imagePath: "" });
  renderSections();
  updateStats();
  // Scroll to bottom
  setTimeout(() => {
    const panel = document.getElementById("sectionsPanel");
    panel.scrollTop = panel.scrollHeight;
  }, 50);
}

function removeSection(id) {
  sections = sections.filter(s => s.id !== id);
  renderSections();
  updateStats();
}

function moveSection(id, dir) {
  const idx = sections.findIndex(s => s.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= sections.length) return;
  [sections[idx], sections[newIdx]] = [sections[newIdx], sections[idx]];
  renderSections();
}

function renderSections() {
  const list = document.getElementById("sectionsList");
  const empty = document.getElementById("emptyState");
  empty.style.display = sections.length === 0 ? "flex" : "none";

  list.innerHTML = sections.map((s, i) => {
    const isPortrait = config.aspectRatio === "9:16";
    const hasImg = s.imagePath && s.imagePath.length > 0;
    const imgName = hasImg ? s.imagePath.split(/[\\/]/).pop() : "";
    return `
    <div class="section-card" id="card-${s.id}">
      <div class="section-header">
        <div class="section-num">${i+1}</div>
        <div class="section-title">Section ${i+1}</div>
        <span class="section-duration" id="dur-${s.id}"></span>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="moveSection(${s.id},-1)" ${i===0?"disabled":""} title="Lên">↑</button>
        <button class="btn btn-ghost btn-sm btn-icon" onclick="moveSection(${s.id},1)" ${i===sections.length-1?"disabled":""} title="Xuống">↓</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="removeSection(${s.id})" title="Xóa">✕</button>
      </div>
      <div class="section-body">
        <div class="script-area">
          <div class="script-label">Script</div>
          <textarea class="script-input" id="script-${s.id}" placeholder="Nhập nội dung giọng đọc cho section này..."
            oninput="onScriptChange(${s.id}, this.value)">${s.script}</textarea>
          <div class="char-count" id="cc-${s.id}">${s.script.length} ký tự</div>
        </div>
        <div class="image-area">
          <div class="script-label">Hình ảnh</div>
          <div class="image-preview ${isPortrait?"portrait":""}" id="imgprev-${s.id}" onclick="pickImage(${s.id})" title="Click để chọn ảnh">
            <img id="imgel-${s.id}" src="" alt="" ${hasImg?`src="file://${s.imagePath}"`:""} class="${hasImg?"loaded":""}"/>
            <div class="image-placeholder" id="imgph-${s.id}" style="display:${hasImg?"none":"flex"};flex-direction:column;align-items:center">
              <div class="icon">🖼</div>
              <div>Click để chọn</div>
            </div>
          </div>
          <div class="img-path" id="imgpath-${s.id}">${imgName}</div>
        </div>
      </div>
    </div>`;
  }).join("");

  updateRunBtn();
}

function onScriptChange(id, value) {
  const s = sections.find(s => s.id === id);
  if (s) s.script = value;
  const cc = document.getElementById(`cc-${id}`);
  if (cc) cc.textContent = value.length + " ký tự";
  updateStats();
  updateRunBtn();
}

async function pickImage(id) {
  const filePath = await window.api.pickImage();
  if (!filePath) return;
  const s = sections.find(s => s.id === id);
  if (!s) return;
  s.imagePath = filePath;
  const imgEl = document.getElementById(`imgel-${id}`);
  const imgPh = document.getElementById(`imgph-${id}`);
  const imgPath = document.getElementById(`imgpath-${id}`);
  if (imgEl) { imgEl.src = "file://" + filePath; imgEl.classList.add("loaded"); }
  if (imgPh) imgPh.style.display = "none";
  if (imgPath) imgPath.textContent = filePath.split(/[\\/]/).pop();
  updateRunBtn();
}

function updateImagePreviews() {
  sections.forEach(s => {
    const prev = document.getElementById(`imgprev-${s.id}`);
    if (prev) {
      if (config.aspectRatio === "9:16") prev.classList.add("portrait");
      else prev.classList.remove("portrait");
    }
  });
}

function updateRunBtn() {
  const valid = sections.length > 0 &&
    sections.every(s => s.script.trim().length > 0 && s.imagePath.length > 0);
  document.getElementById("runBtn").disabled = !valid || isRunning;
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const totalChars = sections.reduce((a, s) => a + s.script.length, 0);
  document.getElementById("statSections").textContent = sections.length + " sections";
  document.getElementById("statChars").textContent = totalChars.toLocaleString() + " ký tự";
}

// ============================================================
// OUTPUT DIR
// ============================================================
document.getElementById("pickDirBtn").addEventListener("click", async () => {
  const dir = await window.api.pickOutputDir();
  if (dir) {
    config.outputDir = dir;
    document.getElementById("outputDir").value = dir;
  }
});

// ============================================================
// BG MUSIC
// ============================================================
let bgMusicPath = null;

document.getElementById("pickMusicBtn").addEventListener("click", async () => {
  const filePath = await window.api.pickMusic();
  if (!filePath) return;
  bgMusicPath = filePath;
  const name = filePath.split(/[\\/]/).pop();
  const el = document.getElementById("musicName");
  el.textContent = name;
  el.classList.add("has-file");
  document.getElementById("clearMusicBtn").style.display = "";
});

document.getElementById("clearMusicBtn").addEventListener("click", () => {
  bgMusicPath = null;
  const el = document.getElementById("musicName");
  el.textContent = "Chưa chọn file nhạc";
  el.classList.remove("has-file");
  document.getElementById("clearMusicBtn").style.display = "none";
});

const volSlider = document.getElementById("bgMusicVolume");
const volVal    = document.getElementById("bgMusicVolumeVal");
volSlider.addEventListener("input", () => {
  const v = volSlider.value;
  volVal.textContent = v + "%";
  volSlider.style.background = `linear-gradient(90deg, var(--accent) ${v}%, var(--surface3) ${v}%)`;
});

// ============================================================
// TEXT OVERLAY CONFIG
// ============================================================
let overlayTitleColor = "white";
let overlaySubColor = "white";

document.getElementById("titleColorSwatches").addEventListener("click", e => {
  const sw = e.target.closest(".color-swatch");
  if (!sw) return;
  document.querySelectorAll("#titleColorSwatches .color-swatch").forEach(s => s.classList.remove("selected"));
  sw.classList.add("selected");
  overlayTitleColor = sw.dataset.color;
});

document.getElementById("subColorSwatches").addEventListener("click", e => {
  const sw = e.target.closest(".color-swatch");
  if (!sw) return;
  document.querySelectorAll("#subColorSwatches .color-swatch").forEach(s => s.classList.remove("selected"));
  sw.classList.add("selected");
  overlaySubColor = sw.dataset.color;
});

function getOverlayConfig() {
  const title = document.getElementById("overlayTitle").value.trim();
  const subtitle = document.getElementById("overlaySubtitle").value.trim();
  if (!title && !subtitle) return null;
  return {
    title,
    subtitle,
    font: document.getElementById("overlayFont").value,
    titleSize: parseInt(document.getElementById("overlayTitleSize").value) || 52,
    subSize: parseInt(document.getElementById("overlaySubSize").value) || 32,
    titleColor: overlayTitleColor,
    subColor: overlaySubColor,
    topPercent: parseInt(document.getElementById("overlayTop").value) || 10,
    duration: parseInt(document.getElementById("overlayDuration").value) || 5,
  };
}

// ============================================================
// RUN / STOP
// ============================================================
document.getElementById("runBtn").addEventListener("click", () => runPipeline(0));
document.getElementById("resumeBtn").addEventListener("click", resumePipeline);
document.getElementById("stopBtn").addEventListener("click", () => window.api.stopPipeline());

async function runPipeline(fromIndex = 0) {
  if (isRunning) return;
  if (!config.outputDir) {
    log("Vui lòng chọn thư mục xuất trước.", "error");
    return;
  }

  isRunning = true;
  resumeFromIndex = 0;
  document.getElementById("runBtn").disabled = true;
  document.getElementById("resumeBtn").style.display = "none";
  document.getElementById("stopBtn").disabled = false;
  document.getElementById("doneSection").classList.remove("show");
  setProgress(0, "Đang khởi động...");

  const startLabel = fromIndex > 0 ? ` (tiếp từ section ${fromIndex + 1})` : "";
  log(`▶ Bắt đầu tạo video · ${sections.length} sections${startLabel} · ${config.aspectRatio} · ${config.gender} · ${config.lang}`, "info");

  await window.api.runPipeline(sections, {
    ...config,
    startFrom: fromIndex,
    overlay: getOverlayConfig(),
    bgMusic: bgMusicPath,
    bgMusicVolume: parseInt(document.getElementById("bgMusicVolume").value) / 100,
  });
}

function resumePipeline() {
  runPipeline(resumeFromIndex);
}

// ============================================================
// EVENTS FROM MAIN
// ============================================================
window.api.on("video-progress", data => {
  const pct = data.total > 0 ? Math.round((data.sectionIndex / data.total) * 100) : 0;
  setProgress(pct, data.message || "");
});

window.api.on("video-log", data => {
  log(data.message, data.type);
});

window.api.on("video-done", data => {
  isRunning = false;
  document.getElementById("runBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
  setProgress(100, "✅ Hoàn thành!");
  document.getElementById("doneSection").classList.add("show");
  document.getElementById("donePath").textContent = data.outputPath;
  log(`✅ Video đã lưu: ${data.outputPath}`, "success");
});

window.api.on("video-stopped", () => {
  isRunning = false;
  document.getElementById("stopBtn").disabled = true;
  setProgress(0, "Đã dừng");
  log("■ Đã dừng pipeline", "warning");
  updateRunBtn();
});

window.api.on("video-error", data => {
  isRunning = false;
  document.getElementById("stopBtn").disabled = true;

  if (data.failedIndex === 0) {
    // Section đầu tiên lỗi → enable nút Tạo Video để tạo lại từ đầu
    resumeFromIndex = 0;
    document.getElementById("resumeBtn").style.display = "none";
    updateRunBtn(); // enable runBtn
    setProgress(0, "❌ Thất bại — thử lại");
  } else {
    // Section giữa lỗi → hiện nút tiếp tục từ section đó
    resumeFromIndex = data.failedIndex;
    document.getElementById("resumeBtn").style.display = "flex";
    document.getElementById("resumeLabel").textContent = data.failedIndex + 1;
    document.getElementById("runBtn").disabled = true;
    setProgress(
      Math.round((data.failedIndex / sections.length) * 100),
      `❌ Dừng tại section ${data.failedIndex + 1}`
    );
    log(`↩ Có thể tiếp tục từ section ${data.failedIndex + 1}`, "warning");
  }
});

// ============================================================
// PROGRESS + LOG
// ============================================================
function setProgress(pct, status) {
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressStatus").textContent = status;
}

function log(msg, type = "info") {
  const container = document.getElementById("logContainer");
  const line = document.createElement("div");
  line.className = `log-line log-${type}`;
  const time = new Date().toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  line.textContent = `[${time}] ${msg}`;
  container.appendChild(line);
  container.scrollTop = container.scrollHeight;
}

function clearLog() {
  document.getElementById("logContainer").innerHTML = "";
}

// ============================================================
// ADD SECTION BUTTON
// ============================================================
document.getElementById("addSectionBtn").addEventListener("click", addSection);

// Init
renderSections();
updateStats();
</script>
</body>
</html>
